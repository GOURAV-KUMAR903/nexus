<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
</head>
<body>
    <h1>URL Shortener</h1>
    <form method="post" action="/shorten">
        <input type="url" name="original_url" placeholder="Enter URL" required>
        <button type="submit">Shorten</button>
    </form>

    {% if short_url %}
        <h2>Short URL: <a href="{{ short_url }}" target="_blank" rel="noopener noreferrer">{{ short_url }}</a></h2>
    {% endif %}
</body>
</html>
