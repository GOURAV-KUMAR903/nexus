<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{APP_NAME}}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </head>
  <style>
    body {
      text-align: center;
      text-shadow: 1px;
    }

    table {
      border-collapse: collapse;
      width: 1000px;
      align-items: center;
      margin: 0 auto;
    }

    button a {
      text-decoration: none;
      color: black;
    }

    .header {
      background-color: rgb(242, 242, 242);
    }
  </style>

  <body>
    <h2 class="header">Users List</h2>

    <table class="table table-hover table-striped">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
      </tr>

      {% for user in users %}
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.password }}</td>
      </tr>
      {% endfor %}
    </table>

    <div class="mt-4">
      {% if page > 1 %}
      <a href="/users?page={{ page-1 }}" class="btn btn-primary">Previous</a>
      {% endif %}

      <span class="mx-3"> Page {{ page }} of {{ total_pages }} </span>

      {% if page < total_pages %}
      <a href="/users?page={{ page+1 }}" class="btn btn-primary">Next</a>
      {% endif %}
    </div>
    <a href="/" class="btn btn-success mt-3 w-50">Add User</a>
  </body>
</html>
